server:
  port: 8080 # 8443 when SSL is enabled
  ssl:
    enabled: false                          # flip to true once certificate is in place
    key-store: classpath:keystore.p12       # or file:/path/to/keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12
    key-alias: rtlsdr-spring

rtlsdr:
  # Set to 0 (or device index) to open on startup; -1 = manual open via REST
  device-index: 0   

  # rtl_tcp-compatible TCP server
  tcp-port: 1234
  tcp-auto-start: true

  # Initial tuner settings (applied when the device is opened)
  initial-frequency-hz: 100000000       # 100 MHz
  initial-sample-rate-hz: 2048000       # 2.048 Msps — standard SDR rate
  initial-gain-tenths-db: -1              # -1 = auto-gain

  # librtlsdr async transfer buffers
  # 0 = use librtlsdr defaults (32 buffers × 16384 bytes each)
  async-buffer-count: 0
  async-buffer-length-bytes: 0

logging:
  level:
    org.tauasa.apps.rtlsdr: DEBUG
    root: INFO
